<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Zoom Depo Pro v3.10.0</title>

    <meta name="theme-color" content="#101828">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Zoom Depo">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icons/zoom-depo.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/icons/zoom-depo-192.png">
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>Zoom Depo Pro v3.10.0</h1>

    <div class="userBar" id="userBar" hidden></div>
    <div class="apiStatusBanner" id="apiStatusBanner" hidden></div>

    <nav class="topTabs" aria-label="Ana menü">
        <button class="tabButton active" type="button" data-tab="orders">Sipariş Hazırla</button>
        <button class="tabButton" type="button" data-tab="operations">Operasyon Panosu</button>
        <button class="tabButton" type="button" data-tab="issues">Eksik Siparişler</button>
        <button class="tabButton" type="button" data-tab="locations">Raf Bul / İade Yerleştir</button>
        <button class="tabButton" type="button" data-tab="shipments">Kargoya Hazır</button>
        <button class="tabButton" type="button" data-tab="history">Hazırlama Geçmişi</button>
        <button class="tabButton" type="button" data-tab="users" hidden>Kullanıcılar</button>
    </nav>

    <div class="searchBox">

        <input
            type="text"
            id="search"
            placeholder="Müşteri adı, soyadı veya sipariş no..."
            autocomplete="off"
        >

    </div>

    <div id="result">

        <div class="loading">

            Siparişler yükleniyor...

        </div>

    </div>

</div>

<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="app.js?v=3.8.6"></script>
<script>
if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("/service-worker.js"));
}
</script>

</body>

</html>
